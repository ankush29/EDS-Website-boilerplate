<html>
  <head>
    <title>Icon Buttons Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <script src="/scripts/aem.js" type="module"></script>
    <script src="/scripts/scripts.js" type="module"></script>
    <link rel="stylesheet" href="/styles/styles.css"/>
    <link rel="stylesheet" href="/styles/lazy-styles.css"/>
  </head>
  <body>
    <header></header>
    <main>
      <div>
        <h1>Custom Icon in Buttons</h1>
        <p>Three button variants using the <code>:heart:</code> icon from <code>/icons/heart.svg</code>.</p>

        <!-- Primary button (bold link) with icon -->
        <p><strong><a href="#">
          <span class="icon icon-heart"></span>Like this post
        </a></strong></p>

        <!-- Secondary button (italic link) with icon -->
        <p><em><a href="#">
          <span class="icon icon-heart"></span>Save to favourites
        </a></em></p>

        <!-- Accent button (bold + italic link) with icon -->
        <p><strong><em><a href="#">
          <span class="icon icon-heart"></span>Add to wishlist
        </a></em></strong></p>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
