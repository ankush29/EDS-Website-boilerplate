<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="WKND Magazine — all articles. Surf camps, cycling adventures, mountain hikes and road trips from around the world.">
  <meta property="og:title" content="WKND Magazine | All Articles">
  <meta property="og:description" content="Every adventure story, trip guide, and destination feature in the WKND archive.">
  <meta property="og:image" content="https://picsum.photos/seed/magazine-hero/1200/630">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <title>WKND Magazine | All Articles</title>
  <script nonce="aem" src="/scripts/aem.js" type="module"></script>
  <script nonce="aem" src="/scripts/scripts.js" type="module"></script>
  <link rel="stylesheet" href="/styles/styles.css">
</head>
<body>
  <header></header>
  <main>
    <!-- Hero -->
    <div>
      <div class="hero block" data-block-name="hero">
        <div>
          <div>
            <picture>
              <source media="(min-width:900px)" srcset="https://picsum.photos/seed/magazine-hero/1920/700">
              <img src="https://picsum.photos/seed/magazine-hero/800/500" alt="WKND Magazine" loading="eager">
            </picture>
            <h1>WKND Magazine</h1>
            <p>Every adventure story, trip guide, and destination feature — all in one place.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Article listing — dynamically populated from query-index.json -->
    <div>
      <div class="article-list block" data-block-name="article-list">
        <div>
          <div>/query-index.json
/magazine/</div>
        </div>
      </div>
    </div>
  </main>
  <footer></footer>
</body>
</html>
